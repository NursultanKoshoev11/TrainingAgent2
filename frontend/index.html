<!doctype html>
<html lang="ru">
<head>
  <meta charset="utf-8" />
  <title>Crypto AI Advisor</title>
  <style>
    body { font-family: Arial, sans-serif; margin: 32px; background: #0b1020; color: #f4f7fb; }
    .grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(320px, 1fr)); gap: 16px; }
    .card { border: 1px solid #26314f; background: #121a2e; border-radius: 12px; padding: 16px; margin: 16px 0; }
    code, pre { background: #18223a; padding: 8px; border-radius: 6px; overflow: auto; }
    button { padding: 10px 14px; border: 0; border-radius: 8px; cursor: pointer; }
    input { padding: 10px; border-radius: 8px; border: 1px solid #26314f; background: #0b1020; color: #f4f7fb; }
  </style>
</head>
<body>
  <h1>Crypto AI Advisor</h1>
  <p>Прототип advisory-only dashboard. Сначала запусти backend на <code>http://localhost:8000</code>.</p>
  <input id="symbol" value="BTC/USDT" />
  <button onclick="bootDashboard()">Обновить dashboard</button>
  <div class="grid">
    <div class="card"><h2>Обзор</h2><pre id="overview">Загрузка...</pre></div>
    <div class="card"><h2>Совет по активу</h2><pre id="advice">Загрузка...</pre></div>
    <div class="card"><h2>Статус провайдеров</h2><pre id="health">Загрузка...</pre></div>
    <div class="card"><h2>Watchlist</h2><pre id="watchlist">Загрузка...</pre></div>
    <div class="card"><h2>Текстовый отчет</h2><pre id="report">Загрузка...</pre></div>
    <div class="card"><h2>Последние signals</h2><pre id="signals">Загрузка...</pre></div>
  </div>
  <script src="app.js"></script>
</body>
</html>
